name: Run unit and Container tests

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '*.md'
      - '*.rst'

  # Allows manual run from the Actions tab
  workflow_dispatch:

  # Allows re-use in other workflows
  workflow_call:

jobs:
  run-tests:
    name: Run tests
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 8
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11','3.13']
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Setup python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test]
      - name: Run unit tests
        run: |
          cd tests
          python -m pytest --dist loadfile -v -m unit --junitxml="test_results.xml"
      - name: Run tutorial tests
        if: runner.os == 'Linux'
        run: |
          python -m pytest --dist loadfile -v -m tutorial --junitxml="test_results_tutorials.xml"
        working-directory: ./tests
      - name: Run simulation tests when on Linux
        if: runner.os == 'Linux'
        run: |
          cd tests
          python -m pytest sim_tests/ -v -m container --junitxml="test_results_sim.xml"
      - name: Upload sim test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: sim_test_results-${{ matrix.os }}-${{ matrix.python-version }}
          path: tests/test_results_sim.xml
